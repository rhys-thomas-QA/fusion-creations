<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thanks | Fusion Creations</title>
  <meta name="robots" content="noindex, nofollow">
  <!-- Google tag (gtag.js) with Consent Mode v2 -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    window.fcConsentOptions = {
      key: 'fc_cookie_consent',
      maxAgeMs: 1000 * 60 * 60 * 24 * 180,
      denied: {
        ad_storage: 'denied',
        analytics_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied'
      },
      granted: {
        ad_storage: 'granted',
        analytics_storage: 'granted',
        ad_user_data: 'granted',
        ad_personalization: 'granted'
      }
    };
    window.fcReadCookieConsent = function () {
      try {
        const value = JSON.parse(localStorage.getItem(window.fcConsentOptions.key) || 'null');
        if (!value || !value.status || !value.updatedAt) return null;
        if (Date.now() - value.updatedAt > window.fcConsentOptions.maxAgeMs) {
          localStorage.removeItem(window.fcConsentOptions.key);
          return null;
        }
        return value.status;
      } catch (error) {
        return null;
      }
    };
    window.fcHasMarketingConsent = function () {
      return window.fcReadCookieConsent() === 'accepted';
    };
    gtag('consent', 'default', {
      ad_storage: 'denied',
      analytics_storage: 'denied',
      ad_user_data: 'denied',
      ad_personalization: 'denied',
      wait_for_update: 500
    });
    if (window.fcHasMarketingConsent()) {
      gtag('consent', 'update', window.fcConsentOptions.granted);
    }
  </script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18013443650"></script>
  <script>
    if (window.fcHasMarketingConsent()) {
      try {
        const userDataKey = 'fc_enhanced_conversion_user_data';
        const userData = JSON.parse(sessionStorage.getItem(userDataKey) || '{}');
        if (userData.email) {
          window.fcEnhancedConversionEmail = userData.email;
          window.fcEnhancedConversionUserData = userData;
          gtag('set', 'user_data', userData);
        }
        sessionStorage.removeItem(userDataKey);
      } catch (error) {}
    }

    gtag('js', new Date());
    gtag('config', 'AW-18013443650');
    gtag('event', 'generate_lead', {
      event_category: 'engagement',
      event_label: 'contact_form',
      value: 1,
      currency: 'GBP'
    });
  </script>

  <link rel="icon" href="img/favicon.png" type="image/png">

    <h1 class="text-3xl sm:text-4xl font-bold mb-4 tracking-tight">Thanks for getting in touch!</h1>
